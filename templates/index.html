<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Persona Sandbox · Elegant</title>

  <!-- Google Fonts & elegant system fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 (light reset, we override heavily) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom professional/elegant styles -->
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="antialiased">

  <!-- subtle decorative grid / background is handled in style.css -->
  <div class="container py-5">

    <!-- Header / Brand -->
    <div class="text-center mb-5">
      <h1 class="display-5 fw-semibold brand-heading">AI Persona Sandbox</h1>
      <p class="text-muted lead">Design intelligent personas, spark conversations.</p>
    </div>

    <!-- PERSONA CREATION CARD – elegant, elevated -->
    <div class="card persona-card mb-5">
      <div class="card-body p-4 p-xl-5">
        <div class="d-flex align-items-center gap-3 mb-4">
          <span class="icon-placeholder">✨</span>
          <h2 class="h3 mb-0 fw-semibold">Create a new persona</h2>
        </div>

        <form id="personaForm">
          <div class="mb-4">
            <label class="form-label fw-medium text-secondary">Name</label>
            <input type="text" class="form-control elegant-input" name="name" placeholder="e.g., Dr. Nova" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium text-secondary">Description / System prompt</label>
            <textarea class="form-control elegant-input" name="description" rows="4" placeholder="You are a visionary architect with a love for biomimicry..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-elegant px-5 py-2">Create persona</button>
        </form>
      </div>
    </div>

    <!-- EXISTING PERSONAS CARD -->
    <div class="card persona-card mb-5">
      <div class="card-body p-4 p-xl-5">
        <div class="d-flex align-items-center gap-3 mb-4">
          <span class="icon-placeholder">🧠</span>
          <h2 class="h3 mb-0 fw-semibold">Existing personas</h2>
        </div>

        <!-- Persona list (Bootstrap list-group, but fully customised via style.css) -->
        <ul id="personaList" class="list-group elegant-list-group"></ul>
        <p id="noPersonas" class="text-muted empty-message mt-4 mb-0" style="display:none;">⟡ No personas created yet. Start above.</p>
      </div>
    </div>

    <!-- START CONVERSATION CARD -->
    <div class="card persona-card">
      <div class="card-body p-4 p-xl-5">
        <div class="d-flex align-items-center gap-3 mb-4">
          <span class="icon-placeholder">💬</span>
          <h2 class="h3 mb-0 fw-semibold">Start a conversation</h2>
        </div>

        <p class="text-muted mb-3" style="font-size: 1.05rem;">Select at least two personas to begin.</p>

        <!-- dynamic checkbox area – ID preserved, no functional change -->
        <div id="selectPersonas" class="elegant-check-group mb-4"></div>

        <button id="startBtn" class="btn btn-success btn-elegant btn-lg px-5 py-2" disabled>
          Start conversation
        </button>
      </div>
    </div>

    <!-- subtle footer -->
    <footer class="text-center text-muted mt-5 small">
      <span>AI Persona Sandbox · conversational simulation</span>
    </footer>
  </div>

  <!-- ORIGINAL JAVASCRIPT – FULLY INTACT, NO FUNCTIONAL CHANGES -->
  <script>
    let personas = []; // Global array to store all personas

    const form = document.getElementById('personaForm');
    const list = document.getElementById('personaList');
    const noPersonasMsg = document.getElementById('noPersonas');
    const selectDiv = document.getElementById('selectPersonas');
    const startBtn = document.getElementById('startBtn');

    // Add a persona to the display list
    function addPersonaToList(p) {
      const li = document.createElement('li');
      li.className = 'list-group-item elegant-list-item';
      li.innerHTML = `
        <div class="persona-item-content">
          <strong class="persona-name">${p.name}</strong><br>
          <small class="persona-desc text-muted">${p.description.substring(0, 150)}${p.description.length > 150 ? '...' : ''}</small>
        </div>
      `;
      list.appendChild(li);
    }

    // Update the checkbox selection area
    function updatePersonaSelection() {
      selectDiv.innerHTML = '';
      if (personas.length === 0) {
        selectDiv.innerHTML = '<p class="text-muted fst-italic">⟡ Create some personas first.</p>';
        startBtn.disabled = true;
        return;
      }

      personas.forEach(p => {
        const div = document.createElement('div');
        div.className = 'form-check elegant-check-item';
        div.innerHTML = `
          <input class="form-check-input custom-check" type="checkbox" value="${p.id}" id="check${p.id}">
          <label class="form-check-label" for="check${p.id}">
            <span class="fw-medium">${p.name}</span> — 
            <span class="text-secondary">${p.description.substring(0, 80)}${p.description.length > 80 ? '...' : ''}</span>
          </label>
        `;
        selectDiv.appendChild(div);
      });
    }

    // Enable/disable start button based on selection
    selectDiv.addEventListener('change', () => {
      const checkedCount = selectDiv.querySelectorAll('input:checked').length;
      startBtn.disabled = checkedCount < 2;
    });

    // Handle form submission (create persona)
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = {
        name: formData.get('name').trim(),
        description: formData.get('description').trim()
      };

      if (!data.name || !data.description) return;

      const res = await fetch('/create_persona', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        const persona = await res.json();
        personas.push(persona);
        addPersonaToList(persona);
        updatePersonaSelection();
        noPersonasMsg.style.display = 'none';
        form.reset();
      } else {
        alert('Error creating persona');
      }
    });

    // Start conversation button
    startBtn.addEventListener('click', async () => {
      const checkedInputs = selectDiv.querySelectorAll('input:checked');
      const persona_ids = Array.from(checkedInputs).map(input => parseInt(input.value));

      if (persona_ids.length < 2) return;

      const res = await fetch('/start_conversation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ persona_ids })
      });

      if (res.ok) {
        const data = await res.json();
        window.location.href = `/conversation/${data.conv_id}`;
      } else {
        alert('Error starting conversation');
      }
    });

    // Load all personas on page load
    async function loadPersonas() {
      const res = await fetch('/personas');
      if (res.ok) {
        personas = await res.json();
        list.innerHTML = '';
        if (personas.length === 0) {
          noPersonasMsg.style.display = 'block';
        } else {
          personas.forEach(addPersonaToList);
          noPersonasMsg.style.display = 'none';
        }
        updatePersonaSelection();
      }
    }

    loadPersonas();
  </script>
</body>
</html>
